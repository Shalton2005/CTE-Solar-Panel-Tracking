name: Feature request
description: Suggest an enhancement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What challenge are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What change do you propose?
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: What improvement should this deliver?
