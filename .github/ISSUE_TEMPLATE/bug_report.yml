name: Bug report
description: Report a reproducible defect
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps and inputs.
    validations:
      required: true

  - type: input
    id: matlab
    attributes:
      label: MATLAB Version
      placeholder: e.g. R2024a

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior

  - type: textarea
    id: evidence
    attributes:
      label: Logs or screenshots
