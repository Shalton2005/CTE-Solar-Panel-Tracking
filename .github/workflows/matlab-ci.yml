name: MATLAB CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2

      - name: Run analysis smoke test
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath('src');
            cfg = default_config();
            cfg.visualization.pauseSec = 0;
            analysis = run_tracking_analysis(cfg);
            assert(all(isfinite(analysis.trackerResults.sunAzimuthDeg)));
            assert(all(isfinite(analysis.trackerResults.sunElevationDeg)));
            assert(all(analysis.trackerResults.panelAzimuthDeg >= 0 & analysis.trackerResults.panelAzimuthDeg <= 180));
            assert(all(analysis.trackerResults.panelElevationDeg >= 0 & analysis.trackerResults.panelElevationDeg <= 180));
            disp('MATLAB CI checks passed.');

      - name: Run MATLAB tests
        uses: matlab-actions/run-command@v2
        with:
          command: run('tests/run_tests.m');
