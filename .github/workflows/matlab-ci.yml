name: MATLAB CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2

      - name: Run simulation smoke test
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath('src');
            cfg = default_config();
            cfg.visualization.pauseSec = 0;
            results = simulate_tracker(cfg);
            assert(all(isfinite(results.sunAzimuthDeg)));
            assert(all(isfinite(results.sunElevationDeg)));
            assert(all(results.panelAzimuthDeg >= 0 & results.panelAzimuthDeg <= 180));
            assert(all(results.panelElevationDeg >= 0 & results.panelElevationDeg <= 180));
            disp('MATLAB CI checks passed.');
